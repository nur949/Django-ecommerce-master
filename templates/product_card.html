
<div class="block2">
	<div class="block2-img wrap-pic-w of-hidden pos-relative block2-label{{ item.get_label_display }}">
		<a href="{{ item.get_absolute_url }}">
			<img src="{{ item.image.url }}" alt="{{ item.title }}" class="product-card-img">
		</a>

		<div class="block2-overlay trans-0-4">
			<a href="{{ item.get_absolute_url }}" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;"></a>

			<button class="block2-btn-addwishlist btn-wishlist-toggle hov-pointer trans-0-4" data-slug="{{ item.slug }}" style="background: transparent; border: none; outline: none; cursor: pointer; color: white; z-index: 5;">
				<i class="far fa-heart" aria-hidden="true" style="font-size: 20px;"></i>
			</button>

			<div class="block2-btn-addcart w-size1 trans-0-4" style="z-index: 5;">
				<!-- Button -->
				<a href="{{ item.get_add_to_cart_url }}" class="flex-c-m size1 bg4 bo-rad-23 hov1 s-text1 trans-0-4" style="text-decoration: none !important;">
					Add to Cart
				</a>
			</div>
		</div>
	</div>

	<div class="block2-txt p-t-20">
		<a href="{{ item.get_absolute_url }}" class="block2-name dis-block s-text3 p-b-5" style="color: black; font-weight: 600;">
			{{ item.title }}
		</a>

		{% if item.discount_price %}
		<span class="block2-oldprice m-text7 p-r-5" style="color: #888; text-decoration: line-through; margin-right: 8px;">
			৳{{ item.price }}
		</span>
		<span class="block2-newprice m-text8 p-r-5" style="color: #e53e3e; font-weight: 700;">
			৳{{ item.discount_price }}
		</span>
		{% else %}
		<span class="block2-price m-text6 p-r-5" style="color: black; font-weight: 600;">
			৳{{ item.price }}
		</span>
		{% endif %}
	</div>
</div>
